ru:
  devise:
    confirmations:
      confirmed: Ваш email успешно подтвержден.
      send_instructions: Через несколько минут вы получите письмо с инструкциями по подтверждению email.
      send_paranoid_instructions: Если ваш email есть в системе, вы получите письмо с инструкциями по подтверждению.
    failure:
      already_authenticated: Вы уже вошли в систему.
      inactive: Ваш аккаунт еще не активирован.
      invalid: Неверный %{authentication_keys} или пароль.
      last_attempt: У вас осталась последняя попытка перед блокировкой аккаунта.
      locked: Ваш аккаунт заблокирован.
      not_found_in_database: Неверный %{authentication_keys} или пароль.
      timeout: Сессия истекла. Войдите снова.
      unauthenticated: Войдите или зарегистрируйтесь, чтобы продолжить.
      unconfirmed: Подтвердите email, чтобы продолжить.
      user:
        invalid: Неверный email или пароль.
    mailer:
      confirmation_instructions:
        action: Подтвердить аккаунт
        greeting: Добро пожаловать, %{email}!
        instruction: 'Вы можете подтвердить email аккаунта по ссылке ниже:'
        subject: Инструкции по подтверждению
      email_changed:
        greeting: Здравствуйте, %{email}!
        instruction_confirmed: Сообщаем, что email вашего аккаунта был изменен на %{email}.
        instruction_unconfirmed: Сообщаем, что email вашего аккаунта изменяется на %{email}.
        subject: Email изменен
      password_change:
        greeting: Здравствуйте, %{email}!
        instruction: Сообщаем, что пароль вашего аккаунта был изменен.
        subject: Пароль изменен
      reset_password_instructions:
        action: Изменить пароль
        greeting: Здравствуйте, %{email}!
        ignore: Если это были не вы, просто проигнорируйте это письмо.
        instruction: Кто-то запросил ссылку для изменения вашего пароля. Сделать это можно по ссылке ниже.
        no_change: Ваш пароль не изменится, пока вы не перейдете по ссылке выше и не создадите новый.
        subject: Инструкции по сбросу пароля
      unlock_instructions:
        action: Разблокировать аккаунт
        greeting: Здравствуйте, %{email}!
        help: 'Перейдите по ссылке ниже, чтобы разблокировать аккаунт:'
        instruction: Ваш аккаунт был заблокирован из-за большого числа неудачных попыток входа.
        subject: Инструкции по разблокировке
    omniauth_callbacks:
      failure: 'Не удалось авторизоваться через %{kind}: "%{reason}".'
      success: Успешная авторизация через %{kind}.
    passwords:
      no_token: Нельзя открыть эту страницу без ссылки из письма для сброса пароля.
      send_instructions: Через несколько минут вы получите письмо с инструкциями по сбросу пароля.
      send_paranoid_instructions: Если ваш email есть в системе, вы получите ссылку для восстановления пароля.
      updated: Ваш пароль успешно изменен. Вы вошли в систему.
      updated_not_active: Ваш пароль успешно изменен.
    registrations:
      destroyed: Аккаунт успешно удален. Будем рады видеть вас снова.
      signed_up: Регистрация прошла успешно.
      signed_up_but_inactive: 'Вы зарегистрировались, но вход пока недоступен: аккаунт не активирован.'
      signed_up_but_locked: 'Вы зарегистрировались, но вход недоступен: аккаунт заблокирован.'
      signed_up_but_unconfirmed: На ваш email отправлено письмо с подтверждением.
      update_needs_confirmation: Данные обновлены. Подтвердите новый email по ссылке из письма.
      updated: Аккаунт успешно обновлен.
      updated_but_not_signed_in: Аккаунт обновлен, но после смены пароля нужно войти снова.
    sessions:
      already_signed_out: Вы уже вышли из аккаунта.
      signed_in: Вход выполнен.
      signed_out: Вы вышли из аккаунта.
    unlocks:
      send_instructions: Через несколько минут вы получите письмо с инструкциями по разблокировке.
      send_paranoid_instructions: Если аккаунт существует, вы получите письмо с инструкциями по разблокировке.
      unlocked: Аккаунт разблокирован. Теперь можно войти.
  errors:
    messages:
      already_confirmed: уже подтвержден
      confirmation_period_expired: нужно подтвердить в течение %{period}, запросите подтверждение заново
      expired: истек, запросите заново
      not_found: не найден
      not_locked: не был заблокирован
      not_saved:
        few: "%{count} ошибки не позволили сохранить %{resource}:"
        many: "%{count} ошибок не позволили сохранить %{resource}:"
        one: '1 ошибка не позволила сохранить %{resource}:'
        other: "%{count} ошибки не позволили сохранить %{resource}:"
