ru:
  simple_form:
    descriptions:
      ai:
        debug: Включает подробные логи RubyLLM и системные логи для AI-запросов и работы инструментов.
        request_timeout: Максимальное число секунд ожидания ответа от AI-провайдера, после которого запрос считается неудачным.
      events:
        maximum_count: Максимальное число сохранённых событий, которые Зоя включает в сводку временных воспоминаний по персонажу во всех периодах вместе.
        period_limit: Максимальное число событий внутри одной временной группы, например Сегодня, Последние 3 месяца или Позже.
        search_default_limit: Сколько результатов возвращает поиск событий, если лимит не был указан явно.
        search_max_limit: Жёсткий верхний предел для количества результатов, которое может вернуть инструмент поиска событий.
      models:
        default_model: Основная чат-модель по умолчанию для Зои и агентов, если для конкретного агента не задана более точная настройка.
      ui:
        admin_console_lines: Сколько последних строк лога загружать в окне консоли администратора.
        datatable_per_page: Сколько строк по умолчанию показывать на одной странице таблицы.
        flash_timeout_ms: Как долго показывать успешные уведомления перед автоматическим закрытием. Ошибки остаются открытыми.
        max_message_bubbles: Длинные ответы ассистента будут разбиваться максимум на столько пузырей в чате.
    error_notification:
      default_message: 'Пожалуйста, исправьте ошибки ниже:'
    'no': Нет
    placeholders:
      character:
        bio: Добавьте краткое описание
        name: Введите имя персонажа
      character_share:
        email: Введите email
      q:
        name_or_key_or_last_error_cont: Поиск MCP серверов
      models:
        default_embedding_model: Выберите модель...
        default_image_model: Выберите модель...
        default_model: Выберите модель...
    required:
      mark: "*"
      text: обязательно
    'yes': Да
