<%
require "dotenv"

Dotenv.load(".kamal/secrets-common", ".kamal/secrets")

server_host = ENV.fetch("KAMAL_SERVER_HOST")
app_host = ENV.fetch("KAMAL_APP_HOST")
app_data_dir = ENV.fetch("KAMAL_APP_DATA_DIR")
postgres_data_dir = ENV.fetch("KAMAL_POSTGRES_DATA_DIR")
%>

service: zoe-ai
image: anteo/zoe-ai
minimum_version: 2.10.0

servers:
  web:
    hosts:
      - <%= server_host %>
    proxy: false
    options:
      publish:
        - "127.0.0.1:3000:3000"
      health-cmd: "curl -f http://localhost:3000/up || exit 1"
      health-interval: "10s"
      health-timeout: "5s"
      health-retries: "5"
      health-start-period: "40s"
    env:
      clear:
        DB_PREPARE: 1
        LOAD_MODELS: 1
  worker:
    hosts:
      - <%= server_host %>
    cmd: bin/docker-entrypoint jobs

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    ACTIVE_STORAGE_SERVICE: local
    JOB_CONCURRENCY: 1
    JOB_THREADS: 3
    LOAD_MODELS: 0
    RAILS_ENV: production
    RAILS_LOG_LEVEL: info
    RAILS_MAX_THREADS: 3
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 0
    ZOE_APP__HOST: <%= app_host %>
    ZOE_APP__PORT: 443
    ZOE_APP__PROTOCOL: https
  secret:
    - DATABASE_URL
    - RAILS_MASTER_KEY

volumes:
  - <%= app_data_dir %>:/rails/storage

accessories:
  postgres:
    service: zoe-ai-postgres
    host: <%= server_host %>
    image: postgres:17
    directories:
      - <%= postgres_data_dir %>:/var/lib/postgresql/data
    env:
      clear:
        POSTGRES_DB: zoe_ai_production
        POSTGRES_USER: zoe_ai
      secret:
        - POSTGRES_PASSWORD

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: deploy

aliases:
  console: app exec -i --reuse "bin/rails console"
  dbconsole: accessory exec postgres -i "psql -U zoe_ai -d zoe_ai_production"
  logs: app logs -f
  migrate: app exec --primary -i "bin/rails db:migrate"
