<%
require "dotenv/load"

server_host = ENV.fetch("KAMAL_SERVER_HOST")
app_host = ENV.fetch("KAMAL_APP_HOST")
app_data_dir = ENV.fetch("KAMAL_APP_DATA_DIR", "zoe_storage")
postgres_data_dir = ENV.fetch("KAMAL_POSTGRES_DATA_DIR", "zoe_postgres_data")
postgres_port = ENV["KAMAL_POSTGRES_PORT"].to_s.strip
postgres_port = nil if postgres_port.empty?
postgres_port = "127.0.0.1:#{postgres_port}:5432" if postgres_port && !postgres_port.include?(":")
%>

service: zoe-ai
image: anteo/zoe-ai
minimum_version: 2.10.0
deploy_timeout: 60
retain_containers: 2

proxy:
  app_port: 3000
  host: <%= app_host %>
  ssl: false
  forward_headers: true
  healthcheck:
    path: /up
    interval: 3
    timeout: 3

servers:
  web:
    hosts:
      - <%= server_host %>
    env:
      clear:
        DB_PREPARE: 1
        LOAD_MODELS: 1
  worker:
    hosts:
      - <%= server_host %>
    cmd: bin/docker-entrypoint jobs

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    ACTIVE_STORAGE_SERVICE: local
    DB_POOL: 7
    JOB_CONCURRENCY: 1
    JOB_THREADS: 5
    LOAD_MODELS: 0
    RAILS_ENV: production
    RAILS_LOG_LEVEL: info
    RAILS_MAX_THREADS: 5
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 0
    ZOE_GOOGLE_CLIENT__ID: <%= ENV["ZOE_GOOGLE_CLIENT__ID"].to_s.inspect %>
    ZOE_GOOGLE_CLIENT__SECRET: <%= ENV["ZOE_GOOGLE_CLIENT__SECRET"].to_s.inspect %>
    ZOE_APP__HOST: <%= app_host %>
    ZOE_APP__PORT: 443
    ZOE_APP__PROTOCOL: https
  secret:
    - DATABASE_URL
    - RAILS_MASTER_KEY

volumes:
  - <%= app_data_dir %>:/rails/storage

accessories:
  postgres:
    service: zoe-ai-postgres
    host: <%= server_host %>
    image: postgres:17
<% if postgres_port %>
    port: <%= postgres_port.inspect %>
<% end %>
    directories:
      - <%= postgres_data_dir %>:/var/lib/postgresql/data
    env:
      clear:
        POSTGRES_DB: zoe_ai_production
        POSTGRES_USER: zoe_ai
      secret:
        - POSTGRES_PASSWORD

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: deploy

aliases:
  console: app exec -i --reuse "bin/rails console"
  dbconsole: accessory exec postgres -i "sh -lc 'PGPASSWORD=\"$POSTGRES_PASSWORD\" exec psql -h zoe-ai-postgres -U zoe_ai -d zoe_ai_production'"
  logs: app logs -f
  migrate: app exec --primary -i "bin/rails db:migrate"
